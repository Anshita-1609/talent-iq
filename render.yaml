services:
  - type: web
    name: talent-iq-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://your-frontend-url.vercel.app
      # Add your actual environment variables here
      - key: STREAM_API_KEY
        value: your_stream_api_key
      - key: STREAM_API_SECRET
        value: your_stream_api_secret
      - key: CLERK_PUBLISHABLE_KEY
        value: your_clerk_publishable_key
      - key: CLERK_SECRET_KEY
        value: your_clerk_secret_key